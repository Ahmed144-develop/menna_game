<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Us, By The Numbers 💕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --plum-black: #2B0F1C;
    --deep-rose: #7A1F3D;
    --blush: #F5D6D9;
    --gold: #C89B3C;
    --paper: #FFF8F3;
    --paper-warm: #FBEDE6;
    --shadow: rgba(122, 31, 61, 0.25);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 10%, var(--blush) 0%, transparent 45%),
      radial-gradient(circle at 85% 90%, var(--gold) 0%, transparent 35%),
      var(--paper);
    font-family: 'Quicksand', sans-serif;
    color: var(--plum-black);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 40px 16px 80px;
    overflow-x:hidden;
  }

  .hero{ text-align:center; max-width:600px; margin-bottom: 30px; }

  .eyebrow{
    letter-spacing: 0.35em;
    text-transform:uppercase;
    font-size: 0.7rem;
    color: var(--deep-rose);
    font-weight:700;
    margin-bottom: 14px;
  }

  h1{
    font-family: 'Cormorant Garamond', serif;
    font-weight:600;
    font-size: clamp(2.2rem, 6vw, 3.2rem);
    margin: 0 0 10px;
    color: var(--deep-rose);
    line-height:1.05;
  }

  h1 em{ font-style: italic; color: var(--gold); }

  .sub{
    font-size: 1rem;
    color: #6b4655;
    line-height:1.6;
    max-width: 460px;
    margin: 0 auto;
  }

  .card-panel{
    background: var(--paper-warm);
    border-radius: 22px;
    padding: 36px 30px;
    max-width: 460px;
    width: 100%;
    box-shadow: 0 12px 30px var(--shadow);
    margin-top: 20px;
  }

  .progress{
    display:flex;
    gap:6px;
    margin-bottom: 26px;
  }

  .progress-dot{
    flex:1;
    height: 4px;
    border-radius: 4px;
    background: rgba(122,31,61,0.15);
    transition: background 0.3s ease;
  }

  .progress-dot.active{ background: var(--deep-rose); }

  .q-eyebrow{
    font-size: 0.7rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color: var(--gold);
    font-weight:700;
    margin-bottom: 8px;
  }

  .q-text{
    font-family:'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight:600;
    color: var(--deep-rose);
    margin: 0 0 22px;
    line-height:1.3;
  }

  .options{
    display:flex;
    flex-direction:column;
    gap: 10px;
  }

  .option-btn{
    text-align:left;
    background: var(--paper);
    border: 1.5px solid transparent;
    border-radius: 14px;
    padding: 14px 18px;
    font-family:'Quicksand', sans-serif;
    font-size: 0.95rem;
    color: var(--plum-black);
    cursor:pointer;
    transition: all 0.2s ease;
  }

  .option-btn:hover{
    border-color: var(--deep-rose);
    background: var(--blush);
  }

  /* Result view */
  .result-view{ display:none; text-align:center; }
  .result-view.show{ display:block; animation: pop 0.5s cubic-bezier(.34,1.56,.64,1); }

  @keyframes pop{
    0%{ transform: scale(0.85); opacity:0; }
    100%{ transform: scale(1); opacity:1; }
  }

  .dial-wrap{
    position:relative;
    width: 190px;
    height: 190px;
    margin: 6px auto 18px;
  }

  .dial-wrap svg{ transform: rotate(-90deg); }

  .dial-bg{
    fill:none;
    stroke: rgba(122,31,61,0.12);
    stroke-width: 14;
  }

  .dial-fg{
    fill:none;
    stroke: var(--deep-rose);
    stroke-width: 14;
    stroke-linecap: round;
    stroke-dasharray: 502;
    stroke-dashoffset: 502;
    transition: stroke-dashoffset 1.4s cubic-bezier(.2,.7,.3,1);
  }

  .dial-percent{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
  }

  .dial-percent .num{
    font-family:'Cormorant Garamond', serif;
    font-size: 2.6rem;
    font-weight:600;
    color: var(--deep-rose);
  }

  .dial-percent .pct-label{
    font-size: 0.65rem;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color: #9b7484;
  }

  .result-title{
    font-family:'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight:600;
    color: var(--deep-rose);
    margin: 6px 0 10px;
  }

  .result-msg{
    font-family:'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-style: italic;
    line-height:1.6;
    color: #4a2a36;
    margin: 0 0 24px;
  }

  .again-btn{
    background: transparent;
    border: 1.5px solid var(--deep-rose);
    color: var(--deep-rose);
    padding: 10px 24px;
    border-radius: 100px;
    font-family:'Quicksand', sans-serif;
    font-weight:600;
    font-size: 0.85rem;
    cursor:pointer;
    transition: all 0.2s ease;
  }

  .again-btn:hover{ background: var(--deep-rose); color: var(--paper); }

  footer{
    margin-top: 40px;
    font-size: 0.75rem;
    color: #b58b9a;
    text-align:center;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

  <div class="hero">
    <div class="eyebrow">A very unscientific experiment</div>
    <h1>Us, <em>By The Numbers</em></h1>
    <p class="sub">Answer honestly. The result was rigged from the start — but let's make it official anyway. 🤍</p>
  </div>

  <div class="card-panel">
    <div class="progress" id="progress"></div>

    <div id="quiz-view">
      <div class="q-eyebrow" id="q-count">Question 1 of 6</div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
    </div>

    <div class="result-view" id="result-view">
      <div class="dial-wrap">
        <svg width="190" height="190" viewBox="0 0 190 190">
          <circle class="dial-bg" cx="95" cy="95" r="80"></circle>
          <circle class="dial-fg" id="dial-fg" cx="95" cy="95" r="80"></circle>
        </svg>
        <div class="dial-percent">
          <span class="num" id="pct-num">0%</span>
          <span class="pct-label">Compatible</span>
        </div>
      </div>
      <div class="result-title" id="result-title"></div>
      <p class="result-msg" id="result-msg"></p>
      <button class="again-btn" id="againBtn">Run It Back</button>
    </div>
  </div>

  <footer>Made with love, for Menna. 💌</footer>

<script>
const QUESTIONS = [
  {
    text: "When we disagree about something small, what usually happens?",
    options: [
      "One of us makes the other laugh and it's over",
      "We talk it out properly",
      "We both go quiet, then come back to it"
    ]
  },
  {
    text: "Pick the closest thing to our ideal Friday night:",
    options: [
      "Staying in, doing nothing, together",
      "Trying somewhere new to eat",
      "A long call or video chat"
    ]
  },
  {
    text: "What do you think I'd say is your best quality?",
    options: [
      "How you make me feel understood",
      "Your sense of humor",
      "How steady and reliable you are"
    ]
  },
  {
    text: "If I had a rough day, what would help most?",
    options: [
      "Just listening, no fixing",
      "A distraction — something fun",
      "Practical help sorting it out"
    ]
  },
  {
    text: "Which of these feels most true about us?",
    options: [
      "We bring out the calm in each other",
      "We bring out the fun in each other",
      "We push each other to grow"
    ]
  },
  {
    text: "Last one — what do you think this quiz is going to say?",
    options: [
      "Something ridiculously high",
      "I have no idea, surprise me",
      "Whatever it says, I already know the answer"
    ]
  }
];

const RESULT_TITLES = [
  "Statistically Undeniable",
  "Off The Charts",
  "Written In The Stars (and the code)"
];

const RESULT_MESSAGES = [
  "No matter which answers you picked, the math always lands on the same place — because some things don't need a quiz to prove them. This one's just for fun.",
  "The numbers say what I already knew the day I met you. This is just the universe agreeing with me.",
  "Turns out compatibility isn't really about the answers — it's about who you're answering with. That part, I got right."
];

let currentQ = 0;
let answers = [];

const progressEl = document.getElementById('progress');
const qCountEl = document.getElementById('q-count');
const qTextEl = document.getElementById('q-text');
const optionsEl = document.getElementById('options');
const quizView = document.getElementById('quiz-view');
const resultView = document.getElementById('result-view');
const dialFg = document.getElementById('dial-fg');
const pctNum = document.getElementById('pct-num');
const resultTitle = document.getElementById('result-title');
const resultMsg = document.getElementById('result-msg');

function buildProgress(){
  progressEl.innerHTML = '';
  QUESTIONS.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'progress-dot' + (i <= currentQ ? ' active' : '');
    progressEl.appendChild(dot);
  });
}

function renderQuestion(){
  buildProgress();
  const q = QUESTIONS[currentQ];
  qCountEl.textContent = `Question ${currentQ + 1} of ${QUESTIONS.length}`;
  qTextEl.textContent = q.text;
  optionsEl.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => selectOption(idx));
    optionsEl.appendChild(btn);
  });
}

function selectOption(idx){
  answers.push(idx);
  currentQ++;
  if(currentQ < QUESTIONS.length){
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult(){
  quizView.style.display = 'none';
  resultView.classList.add('show');

  // The percentage always lands somewhere delightfully high (97-100%),
  // regardless of answers -- this is a love calculator, not a real survey.
  const pct = 97 + (answers.reduce((a,b) => a+b, 0) % 4);
  const circumference = 502;
  const offset = circumference - (circumference * pct / 100);

  let displayed = 0;
  const duration = 1200;
  const start = performance.now();

  function animate(now){
    const progress = Math.min((now - start) / duration, 1);
    displayed = Math.round(progress * pct);
    pctNum.textContent = displayed + '%';
    if(progress < 1) requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  setTimeout(() => {
    dialFg.style.strokeDashoffset = offset;
  }, 100);

  const variant = answers[0] % RESULT_TITLES.length;
  resultTitle.textContent = RESULT_TITLES[variant];
  resultMsg.textContent = RESULT_MESSAGES[variant];
}

document.getElementById('againBtn').addEventListener('click', () => {
  currentQ = 0;
  answers = [];
  dialFg.style.strokeDashoffset = 502;
  resultView.classList.remove('show');
  quizView.style.display = 'block';
  renderQuestion();
});

renderQuestion();
</script>

</body>
</html>
